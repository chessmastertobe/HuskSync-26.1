name: Build HuskSync

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - run: chmod +x gradlew

      - run: ./gradlew build --no-daemon -x test

      - uses: actions/upload-artifact@v4
        with:
          name: HuskSync-JAR
          path: build/libs/*.jar
