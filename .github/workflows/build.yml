name: Build HuskSync

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon -x test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: HuskSync-JAR
          path: build/libs/*.jar
